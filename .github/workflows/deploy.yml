name: Deploy

on:
  # Manual until Azure OIDC secrets (AZURE_CLIENT_ID/TENANT_ID/SUBSCRIPTION_ID,
  # POSTGRES_ADMIN_PASSWORD) and the `production` environment are configured.
  workflow_dispatch:

permissions:
  id-token: write   # OIDC federated login to Azure
  contents: read
  packages: write   # push images to GHCR

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: ${{ github.repository_owner }}/the-ledger

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Gate on a configured environment so deploys require approval / secrets.
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # .NET SDK container publish — no Dockerfile needed.
      - name: Publish API image
        run: >
          dotnet publish src/TheLedger.Api -c Release --os linux --arch x64 /t:PublishContainer
          -p:ContainerRegistry=${{ env.REGISTRY }}
          -p:ContainerRepository=${{ env.IMAGE_BASE }}-api
          -p:ContainerImageTag=${{ github.sha }}

      - name: Publish Worker image
        run: >
          dotnet publish src/TheLedger.Worker -c Release --os linux --arch x64 /t:PublishContainer
          -p:ContainerRegistry=${{ env.REGISTRY }}
          -p:ContainerRepository=${{ env.IMAGE_BASE }}-worker
          -p:ContainerImageTag=${{ github.sha }}

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform apply
        working-directory: infra
        env:
          ARM_USE_OIDC: 'true'
          TF_VAR_postgres_admin_password: ${{ secrets.POSTGRES_ADMIN_PASSWORD }}
          TF_VAR_api_image: ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}-api:${{ github.sha }}
          TF_VAR_worker_image: ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}-worker:${{ github.sha }}
        run: |
          terraform init
          terraform apply -auto-approve
