name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - run: dotnet build -c Release
      # Exclude the Docker-backed Aspire boot test (TheLedger.AppHost.Tests) — it is a slow,
      # container-dependent local/on-demand smoke test, not a blocking gate.
      - run: dotnet test -c Release --no-build --filter "FullyQualifiedName!~AppHost"

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      # npm install (not ci): the lock is generated on Windows and omits some
      # Linux-only optional native deps that `npm ci` strictly requires.
      - run: npm install --no-audit --no-fund
      - run: npm run lint
      - run: npm run build
      - run: npm test

  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - run: terraform fmt -check -recursive
      - run: terraform init -backend=false
      - run: terraform validate
